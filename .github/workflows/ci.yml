name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR to avoid parallel runners
# each downloading the ~5.5 GB ML dependency set (torch, umap, whisper, etc.)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          # Caches ~/.cache/uv keyed on uv.lock. Cache miss (~8-12 min first run)
          # populates the archive; subsequent runs restore in ~30 s.
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (all extras)
        run: uv sync --frozen --all-extras

      - name: Lint — ruff check
        run: uv run ruff check src/ tests/

      - name: Lint — ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Type check — mypy
        run: uv run mypy src/autorag/

  test-full:
    name: Tests (all extras)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (all extras)
        run: uv sync --frozen --all-extras

      - name: Run tests
        env:
          # Default db_path (~/.autorag/autorag.db) may not exist on a fresh runner
          AUTORAG_DB_PATH: /tmp/autorag-ci.db
        run: uv run pytest -v

  test-base:
    name: SDK base install (no extras)
    runs-on: ubuntu-latest
    # Guards against accidental heavy-dep imports leaking into core/__init__/embed/store.
    # `from autorag import AutoRAG` must boot without torch/chromadb/pyannote installed.

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install base only (no extras)
        run: uv sync --frozen --no-dev

      - name: Smoke test — base import works without heavy deps
        run: |
          uv run --no-dev python -c "
          from autorag import AutoRAG, TranscriptionResult, TopicTree, TopicDict, WordSpan
          rag = AutoRAG()
          assert hasattr(rag, 'transcribe')
          assert hasattr(rag, 'build_agent')
          assert hasattr(rag, 'persist_transcription')
          print('OK: base install boots and exposes SDK surface')
          "
