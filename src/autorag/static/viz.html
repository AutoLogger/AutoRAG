<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Constellation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #020409;
    --panel-bg:  rgba(4, 8, 20, 0.78);
    --border:    rgba(80, 140, 255, 0.15);
    --text-hi:   #ddeeff;
    --text-lo:   #4a6a8a;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Space Grotesk', sans-serif;
    --accent:    rgba(90, 160, 255, 0.9);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--sans);
    color: var(--text-hi);
  }

  canvas {
    position: fixed; inset: 0;
    display: block;
    width: 100% !important; height: 100% !important;
  }

  /* ── UI panel ── */
  #panel {
    position: fixed; top: 24px; left: 24px; z-index: 10;
    width: 248px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  #panel h1 {
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  #stats {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-lo);
    margin-bottom: 14px;
  }

  #legend { display: flex; flex-direction: column; gap: 7px; }

  .legend-row {
    display: flex; align-items: center; gap: 9px;
    font-size: 0.74rem;
    color: var(--text-hi);
    white-space: nowrap;
    overflow: hidden;
  }

  .legend-dot {
    flex-shrink: 0;
    width: 10px; height: 10px;
    border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
  }

  .legend-label { overflow: hidden; text-overflow: ellipsis; }

  /* ── Tooltip ── */
  #tooltip {
    display: none;
    position: fixed;
    z-index: 20;
    pointer-events: none;
    max-width: 290px;
    background: rgba(4, 9, 22, 0.94);
    border: 1px solid rgba(90, 150, 255, 0.28);
    border-radius: 7px;
    padding: 10px 14px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.7);
  }

  .tt-title {
    font-weight: 600;
    font-size: 0.86rem;
    color: var(--text-hi);
    margin-bottom: 5px;
    line-height: 1.35;
  }

  .tt-meta {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-lo);
    line-height: 1.6;
  }

  /* ── Loading / Empty overlays ── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 30;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    background: var(--bg);
  }

  .overlay.visible { display: flex; }

  .overlay-icon {
    width: 48px; height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .overlay-text {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-lo);
    letter-spacing: 0.08em;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 1; }
  }

  .pulse { animation: pulse 2.4s ease-in-out infinite; }

  /* ── Level size legend ── */
  #size-legend {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex; gap: 12px; align-items: center;
  }

  .size-row {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 0.64rem; color: var(--text-lo);
  }

  .size-dot {
    background: rgba(150,180,255,0.6);
    border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="loading-overlay" class="overlay visible">
  <div class="overlay-icon"></div>
  <div class="overlay-text">computing embeddings…</div>
</div>

<div id="empty-overlay" class="overlay">
  <div class="overlay-text pulse">no topic data — run <span style="color:var(--accent)">autorag transcribe</span> first</div>
</div>

<div id="error-overlay" class="overlay">
  <div class="overlay-text" id="error-msg" style="color:#ff6b6b;max-width:400px;text-align:center;line-height:1.6"></div>
</div>

<div id="panel">
  <h1>Topic Constellation</h1>
  <div id="stats">—</div>
  <div id="legend"></div>
  <div id="size-legend">
    <div class="size-row"><div class="size-dot" style="width:10px;height:10px"></div>L1</div>
    <div class="size-row"><div class="size-dot" style="width:7px;height:7px"></div>L2</div>
    <div class="size-row"><div class="size-dot" style="width:5px;height:5px"></div>L3</div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Palette: one colour per clip ──────────────────────────────────────────
const PALETTE = [
  0x7B61FF, // electric violet
  0x00D9FF, // cyan
  0xFF6B6B, // coral
  0x69FF47, // neon green
  0xFFB800, // amber
  0xFF47D4, // magenta
  0x47FFD4, // teal
  0xFF8C00, // orange
];

// ── Point sizes by level ──────────────────────────────────────────────────
const LEVEL_SIZE = { 1: 0.22, 2: 0.14, 3: 0.09 };
const LEVEL_OPACITY = { 1: 1.0, 2: 0.75, 3: 0.55 };

// ── Scene setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020409);
scene.fog = new THREE.FogExp2(0x020409, 0.035);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 600);
camera.position.set(0, 0, 9);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.minDistance = 1;
controls.maxDistance = 80;

let resumeTimer = null;
controls.addEventListener('start', () => {
  controls.autoRotate = false;
  clearTimeout(resumeTimer);
});
controls.addEventListener('end', () => {
  clearTimeout(resumeTimer);
  resumeTimer = setTimeout(() => { controls.autoRotate = true; }, 4000);
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Glow sprite texture ───────────────────────────────────────────────────
function makeGlowTexture() {
  const size = 128;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0,    'rgba(255,255,255,1.0)');
  g.addColorStop(0.18, 'rgba(255,255,255,0.85)');
  g.addColorStop(0.5,  'rgba(255,255,255,0.25)');
  g.addColorStop(1,    'rgba(255,255,255,0.0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}
const glowTex = makeGlowTexture();

// ── Background starfield ──────────────────────────────────────────────────
function addStarfield() {
  const N = 2000;
  const pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 60 + Math.random() * 50;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, sizeAttenuation: true });
  scene.add(new THREE.Points(geo, mat));
}
addStarfield();

// ── Raycasting state ──────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.18;
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttMeta  = document.getElementById('tt-meta');

// pointsGroups: Array<{ mesh: THREE.Points, data: TopicPoint[] }>
let pointsGroups = [];

window.addEventListener('pointermove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  let best = null, bestDist = Infinity;

  for (const { mesh, data } of pointsGroups) {
    const hits = raycaster.intersectObject(mesh);
    if (hits.length > 0 && hits[0].distanceToRay < bestDist) {
      bestDist = hits[0].distanceToRay;
      best = { hit: hits[0], data };
    }
  }

  if (best) {
    const pt = best.data[best.hit.index];
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 18) + 'px';
    tooltip.style.top  = (e.clientY - 8)  + 'px';
    ttTitle.textContent = pt.topic_title;
    ttMeta.innerHTML =
      `${pt.clip_title}<br>` +
      `L${pt.level} · ${pt.number} · ${pt.start_s.toFixed(1)}s`;
  } else {
    tooltip.style.display = 'none';
  }
});

// ── Build scene from data ─────────────────────────────────────────────────
function buildScene(data) {
  pointsGroups = [];

  const pts = data.points;
  if (pts.length === 0) return;

  // Normalise coordinates into [-4, 4]
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y), zs = pts.map(p => p.z);
  const ranges = [
    Math.max(...xs) - Math.min(...xs),
    Math.max(...ys) - Math.min(...ys),
    Math.max(...zs) - Math.min(...zs),
  ];
  const maxRange = Math.max(...ranges, 1e-6);
  const scale = 7.0 / maxRange;
  const cx = (Math.max(...xs) + Math.min(...xs)) / 2;
  const cy = (Math.max(...ys) + Math.min(...ys)) / 2;
  const cz = (Math.max(...zs) + Math.min(...zs)) / 2;

  // Group points by (clip_id, level)
  const groups = new Map(); // key: `${clip_idx}_${level}` -> { color, size, opacity, positions, data }
  const clipIdx = Object.fromEntries(data.clip_ids.map((id, i) => [id, i]));

  for (const pt of pts) {
    const ci = clipIdx[pt.clip_id] ?? 0;
    const key = `${ci}_${pt.level}`;
    if (!groups.has(key)) {
      groups.set(key, {
        color:   PALETTE[ci % PALETTE.length],
        size:    LEVEL_SIZE[pt.level]   ?? 0.09,
        opacity: LEVEL_OPACITY[pt.level] ?? 0.5,
        positions: [],
        data: [],
      });
    }
    const g = groups.get(key);
    g.positions.push(
      (pt.x - cx) * scale,
      (pt.y - cy) * scale,
      (pt.z - cz) * scale,
    );
    g.data.push(pt);
  }

  for (const [, g] of groups) {
    const pos = new Float32Array(g.positions);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    const mat = new THREE.PointsMaterial({
      color:       g.color,
      size:        g.size,
      map:         glowTex,
      blending:    THREE.AdditiveBlending,
      depthWrite:  false,
      transparent: true,
      opacity:     g.opacity,
      sizeAttenuation: true,
    });

    const mesh = new THREE.Points(geo, mat);
    scene.add(mesh);
    pointsGroups.push({ mesh, data: g.data });
  }
}

// ── Legend ────────────────────────────────────────────────────────────────
function buildLegend(data) {
  const legend = document.getElementById('legend');
  const MAX = 12;
  const ids = data.clip_ids.slice(0, MAX);
  legend.innerHTML = ids.map((id, i) => {
    const color = '#' + PALETTE[i % PALETTE.length].toString(16).padStart(6, '0');
    const label = (data.clip_titles[id] || id).slice(0, 26);
    return `<div class="legend-row">
      <div class="legend-dot" style="background:${color};color:${color}"></div>
      <div class="legend-label" title="${data.clip_titles[id] || id}">${label}</div>
    </div>`;
  }).join('');
  if (data.clip_ids.length > MAX) {
    legend.innerHTML += `<div class="legend-row" style="color:var(--text-lo);font-size:0.68rem">+${data.clip_ids.length - MAX} more</div>`;
  }
}

function updateStats(data) {
  document.getElementById('stats').textContent =
    `${data.total_topics} topics · ${data.total_clips} clips`;
}

// ── Animation loop ────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ── Main ──────────────────────────────────────────────────────────────────
async function main() {
  let data;
  try {
    const resp = await fetch('/viz/data');
    if (!resp.ok) {
      throw new Error(`Server returned ${resp.status}: ${await resp.text()}`);
    }
    data = await resp.json();
  } catch (err) {
    document.getElementById('loading-overlay').classList.remove('visible');
    document.getElementById('error-msg').textContent = String(err);
    document.getElementById('error-overlay').classList.add('visible');
    return;
  }

  document.getElementById('loading-overlay').classList.remove('visible');

  if (data.total_topics === 0) {
    document.getElementById('empty-overlay').classList.add('visible');
    return;
  }

  buildScene(data);
  buildLegend(data);
  updateStats(data);
  animate();
}

main();
</script>
</body>
</html>
